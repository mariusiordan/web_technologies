<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-In Logger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card">
    <h1>Check-In Logger</h1>
    <p class="subtitle">Times are recorded and stored by the server.</p>

    <div class="columns">

      <!-- LEFT: check in -->
      <section class="panel checkin">
        <h2>Check In</h2>
        <p class="clock" id="clock">--:--:--</p>
        <button id="checkin-btn" type="button">Check In</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <!-- RIGHT: stored timestamps -->
      <section class="panel log">
        <h2>Timestamps</h2>
        <ul id="log-list" class="log-list"></ul>
      </section>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
